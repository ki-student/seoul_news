name: Daily Seoul News Automation

on:
  schedule:
    # 한국 시간(KST) 매일 오전 9시 (UTC 00:00)
    - cron: '0 0 * * *'
  workflow_dispatch: # 수동 실행 버튼 추가

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.9'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Run Orchestrator
      env:
        OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        QDRANT_ENDPOINT: ${{ secrets.QDRANT_ENDPOINT }}
        QDRANT_API_KEY: ${{ secrets.QDRANT_API_KEY }}
        TAVILY_API_KEY: ${{ secrets.TAVILY_API_KEY }}
        ADMIN_SLACK_WEBHOOK: ${{ secrets.ADMIN_SLACK_WEBHOOK }}
        SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
      run: python worker/orchestrator.py
